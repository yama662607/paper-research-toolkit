name: install-lint

on:
  pull_request:
  push:
    branches: [main]

jobs:
  install-lint:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - name: Check generated install docs
        run: python scripts/generate_install_docs.py --check
      - name: Validate install docs
        run: python scripts/check_install_docs.py
      - name: Compile install scripts
        run: python -c "import pathlib, py_compile; [py_compile.compile(str(p), doraise=True) for root in ('scripts', 'skills/slide-creator/scripts') for p in pathlib.Path(root).glob('*.py')]"
      - name: Run dependency-free slide-creator tests
        run: python -m unittest discover -s tests -p "test_*.py"
      - name: Run slide-creator fixture smoke tests
        run: uv run tests/runtime_smoke.py
